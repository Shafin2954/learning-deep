# Wires the code-runner. Run:  docker compose up --build
#
# The Next.js web app can run on the host (npm run dev) and talk to the runner
# at http://localhost:8000, or be added as a second service here.

services:
  code-runner:
    build:
      context: .
      dockerfile: code-runner/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # origins allowed to call the runner (your web app)
      # Local dev + the deployed Vercel frontend (users run the kernel locally,
      # the browser hits their own localhost:8000 from the hosted page).
      RUNNER_CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,https://learning-deep.vercel.app"
    # ---- hardening for anything beyond your own machine ----
    # Each run executes arbitrary Python. On a shared/hosted box, lock it down:
    #   mem_limit: 2g
    #   cpus: "1.0"
    #   pids_limit: 256
    #   read_only: true          # plus tmpfs for /tmp
    #   security_opt: ["no-new-privileges:true"]
    # For GPU: uncomment and use a CUDA base image in the Dockerfile.
    #   deploy:
    #     resources:
    #       reservations:
    #         devices: [{capabilities: ["gpu"]}]
    restart: unless-stopped

  # Optional: run the web app in a container too.
  # web:
  #   build: ./web
  #   ports: ["3000:3000"]
  #   environment:
  #     NEXT_PUBLIC_RUNNER_URL: "http://localhost:8000"
  #   depends_on: [code-runner]
